<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PJ 的生日大冒險</title>
<style>
  :root { --cocoa:#4A3B32; --butter:#FFC75C; --pink:#FFAAB4; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; }
  body {
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:#2A3A4A; color:var(--cocoa);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  #stage { position:relative; width:min(100vw, 178vh); aspect-ratio:16/9; }
  canvas {
    position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges; touch-action:manipulation;
  }
  #hud {
    position:absolute; top:2%; left:2.5%; right:2.5%; display:flex; justify-content:space-between;
    gap:6px; pointer-events:none; z-index:5;
  }
  .chip {
    background:rgba(255,251,238,.92); border:3px solid var(--cocoa); border-radius:12px;
    padding:.24em .55em; font-weight:900; font-size:clamp(11px,2.3vmin,17px);
    box-shadow:0 3px 0 rgba(0,0,0,.25); white-space:nowrap;
  }
  .overlay {
    position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2.6vmin; text-align:center;
    background:rgba(24,40,56,.55); backdrop-filter:blur(2px); padding:4vmin;
  }
  .panel {
    background:#FFF6E0; border:4px solid var(--cocoa); border-radius:20px;
    box-shadow:0 8px 0 rgba(0,0,0,.3); padding:2.6vmin 4.5vmin; max-width:92%; max-height:92%;
    display:flex; flex-direction:column; align-items:center; gap:1.3vmin; overflow:hidden; min-height:0;
  }
  .panel h1 { font-size:clamp(20px,5vmin,38px); font-weight:900; letter-spacing:.04em; }
  .panel p  { font-size:clamp(12px,2.7vmin,17px); line-height:1.75; color:#6B584A; font-weight:700; }
  .btn {
    font-family:inherit; font-weight:900; font-size:clamp(15px,3.2vmin,23px);
    background:var(--butter); color:var(--cocoa); border:4px solid var(--cocoa);
    border-radius:14px; padding:.5em 1.6em; cursor:pointer;
    box-shadow:0 5px 0 var(--cocoa); transition:transform .08s, box-shadow .08s;
  }
  .btn:active { transform:translateY(4px); box-shadow:0 1px 0 var(--cocoa); }
  .btn.mode { width:min(76vw, 380px); display:flex; flex-direction:column; gap:2px; padding:.55em 1em; }
  .btn.mode small { font-weight:700; font-size:.62em; color:#7A6454; }
  .btn.ghost { background:#FFF; }
  .btn.locked { background:#E8E0D0; color:#A89880; box-shadow:0 5px 0 #A89880; border-color:#A89880; }
  .btn.locked small { color:#B3A48C; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .btn.deny { animation:shake .3s; }
  #winArt {
    max-height:44vh; max-width:84%; width:auto; min-height:0; flex:0 1 auto;
    object-fit:contain; border:4px solid var(--cocoa); border-radius:16px;
    box-shadow:0 8px 0 rgba(0,0,0,.3);
  }
  .hidden { display:none !important; }
  #tapHint { position:absolute; bottom:4%; width:100%; text-align:center; color:#fff;
    font-weight:900; font-size:clamp(12px,2.6vmin,17px); text-shadow:0 2px 0 rgba(0,0,0,.4);
    z-index:4; pointer-events:none; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.9} 50%{opacity:.4} }
  .confetti { position:fixed; width:1.6vmin; height:1.6vmin; z-index:20; pointer-events:none;
              animation:fall 2s ease-in forwards; border-radius:20%; top:-5%; }
  @keyframes fall { to { transform:translateY(110vh) rotate(560deg); opacity:0; } }
  @media (orientation: portrait) {
    .panel { padding:5vmin 6vmin; gap:2vmin; }
    .panel h1 { font-size:clamp(20px,6.5vmin,32px); }
    .panel p  { font-size:clamp(13px,3.6vmin,17px); }
    .btn { font-size:clamp(16px,4.5vmin,22px); }
    #winArt { max-height:38vh; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv" width="320" height="180"></canvas>

  <div id="hud" class="hidden">
    <div class="chip"><span id="hearts">❤️❤️❤️</span> 🫛<span id="score">0</span></div>
    <div class="chip" id="goalChip">🕯️<span id="cC">0</span>/34 🐘<span id="cE">0</span>/37 🍰<span id="cK">0</span>/12</div>
    <button class="chip" id="muteBtn" style="pointer-events:auto; cursor:pointer;">🔊</button>
  </div>
  <div id="tapHint" class="hidden">點畫面跳躍（可以二段跳）</div>

  <!-- 模式選單 -->
  <div id="menu" class="overlay">
    <div class="panel">
      <h1>🎂 PJ 的生日大冒險</h1>
      <p style="margin-bottom:.5vmin;">📱 手機請轉「橫向」玩，畫面才夠大！</p>
      <button class="btn mode" id="mStory">🏝️ 故事模式<small>海灘出發 → 直島黃昏，兩關收集 34🕯️ 37🐘 12🍰</small></button>
      <button class="btn mode ghost" id="mEndless">🏃 無盡挑戰<small>不會結束、越跑越快，比距離 PK 最高紀錄</small></button>
      <button class="btn mode ghost" id="mDuo">💑 雙人同樂<small>左半邊控制她、右半邊控制 PJ，共用三顆心</small></button>
    </div>
  </div>

  <!-- 過場：前往直島 -->
  <div id="inter" class="overlay hidden">
    <div class="panel">
      <h1>🌅 第 1 關完成！</h1>
      <p>回憶收集了一半，搭上船前往直島……<br>天色漸暗，速度更快，小心腳步！</p>
      <p id="unlockMsg" class="hidden" style="color:#E8484F;">🔓 新模式解鎖：無盡挑戰＆雙人同樂！</p>
      <button class="btn" id="nextBtn">前往第 2 關 ⛴️</button>
    </div>
  </div>

  <!-- 失敗 -->
  <div id="over" class="overlay hidden">
    <div class="panel">
      <h1 id="overTitle">💥 哎呀，絆倒了！</h1>
      <p id="overStats"></p>
      <button class="btn" id="retryBtn">再挑戰 ↻</button>
      <button class="btn ghost" id="menuBtn1">回選單</button>
    </div>
  </div>

  <!-- 破關 -->
  <div id="win" class="overlay hidden">
    <div class="panel">
      <h1>🎉 全部湊齊了！</h1>

function drawSpr(rows, x, y, sc = 2, override) {

/* ================= 音效 ================= */
let AC = null;
function beep(freq, dur=.09, type='square', vol=.12, when=0) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime + when);
  g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + when + dur);
  o.connect(g).connect(AC.destination);
  o.start(AC.currentTime + when); o.stop(AC.currentTime + when + dur + .02);
}
/* ---- 背景音樂 ---- */
const BGM_MEL  = [659,784,880,784, 659,523,587,659,  698,880,784,698, 659,523,587,0,
                  659,784,880,784, 988,880,784,659,  587,659,698,587, 523,0,523,0];
const BGM_BASS = [131,0,196,0, 131,0,196,0,  175,0,262,0, 175,0,262,0,
                  110,0,165,0, 110,0,165,0,   98,0,147,0,  98,0,147,0];
const bgm = { on:true, step:0, next:0 };
function noteAt(freq, dur, type, vol, at) {
  if (!AC || !freq) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, at);
  g.gain.exponentialRampToValueAtTime(.001, at + dur);
  o.connect(g).connect(AC.destination);
  o.start(at); o.stop(at + dur + .02);
}
setInterval(() => {
  if (!AC || state !== 'play' || !bgm.on) { bgm.next = 0; return; }
  const now = AC.currentTime;
  if (!bgm.next) bgm.next = now + .06;
  const spb = 60 / (118 + speed * 14) / 2;
  while (bgm.next < now + .3) {
    noteAt(BGM_MEL[bgm.step],  spb*.88, 'square',   .05,  bgm.next);
    noteAt(BGM_BASS[bgm.step], spb*.95, 'triangle', .065, bgm.next);
    bgm.step = (bgm.step + 1) % 32;
    bgm.next += spb;
  }
}, 90);
function jingleWin(){
  const G4=392, A4=440, B4=494, C5=523, D5=587, E5=659, F5=698, G5=784;
  const song = [
    [G4,.5],[G4,.5],[A4,1],[G4,1],[C5,1],[B4,2],
    [G4,.5],[G4,.5],[A4,1],[G4,1],[D5,1],[C5,2],
    [G4,.5],[G4,.5],[G5,1],[E5,1],[C5,1],[B4,1],[A4,2],
    [F5,.5],[F5,.5],[E5,1],[C5,1],[D5,1],[C5,2.5]
  ];
  const beat = .3; let when = 0;
  song.forEach(([f, b]) => { beep(f, b*beat*.92, 'triangle', .15, when); when += b*beat; });
}
function jingleMilestone(){ [523,659,784].forEach((f,i)=>beep(f,.1,'triangle',.13,i*.08)); }

/* ================= 生成 ================= */
let spawnTimer = 40;
function pickCollectible() {
  if (mode === 'endless') {
    const r = Math.random();
    return r < .38 ? 'candle' : r < .74 ? 'eleph' : 'cake';
  }
  const cap = (mode==='story' && level===1) ? HALF : NEED;
  const rem = ['candle','eleph','cake'].map(k => Math.max(0, cap[k]-got[k]));
  const tot = rem[0]+rem[1]+rem[2];
  if (tot === 0) return 'bean';
  let r = Math.random()*tot;
  if ((r -= rem[0]) < 0) return 'candle';
  if ((r -= rem[1]) < 0) return 'eleph';
  return 'cake';
}
function spawn() {
  const lvlBoost = (mode==='story' && level===2) ? .06 : 0;
  const rockChance = Math.min(.40, .18 + speed*.045 + lvlBoost);
  if (Math.random() < rockChance) {
    rocks.push({ x:CW+12, y:GROUND, w:24, h:12 });
    if (speed > 2.6 && Math.random() < .3) rocks.push({ x:CW+44, y:GROUND, w:24, h:12 });
    return;
  }
  const beanChance = hearts === 3 ? .08 : hearts === 2 ? .16 : .24;
  if (Math.random() < beanChance) {
    items.push({ x:CW+12, y:GROUND-28-Math.random()*22, type:'bean' });
    return;
  }
  const type = pickCollectible();
  if (type === 'eleph') {
    const n = 1 + Math.floor(Math.random()*3);
    for (let i=0;i<n;i++) items.push({ x:CW+12+i*30, y:GROUND-2, type:'eleph', hue:ELE_COLORS[(Math.random()*5)|0] });
  } else {
    const air = Math.random() < (type==='candle' ? .55 : .35);
    const y = air ? GROUND-36-Math.random()*24 : GROUND-2;
    items.push({ x:CW+12, y, type });
  }
}

/* ================= 更新 ================= */
function goalReached() {
  const cap = (mode==='story' && level===1) ? HALF : NEED;
  return got.candle>=cap.candle && got.eleph>=cap.eleph && got.cake>=cap.cake;
}
function collect(it) {
  if (it.type === 'bean') {
    score++;
    if (hearts < 3) { hearts++; pops.push({x:it.x,y:it.y-18,txt:'+❤️',c:'#D9556B',l:50}); [660,880].forEach((f,i)=>beep(f,.09,'triangle',.13,i*.08)); }
    else pops.push({x:it.x,y:it.y-18,txt:'好吃!',c:'#5FA85C',l:38}), beep(880,.07,'square',.1);
  } else {
    got[it.type]++;
    if (mode === 'endless') distance += 15;   // 無盡模式：收集品折算距離加成
    const info = { candle:['🕯️','#FF8A3C',1046], eleph:['🐘','#5B8FD6',740], cake:['🍰','#E8484F',920] }[it.type];
    pops.push({x:it.x,y:it.y-22,txt:info[0],c:info[1],l:46});
    beep(info[2],.08,'triangle',.12);
    if (mode !== 'endless') {
      const n = got[it.type];
      if (n % 10 === 0) { pops.push({x:120,y:80,txt:n+'!',c:'#6FBF74',l:60}); jingleMilestone(); }
      if (goalReached()) {
        if (mode==='story' && level===1) interlude();
        else win();
      }
    }
  }
  updateHUD();
}
function interlude() {
  state = 'inter';
  if (!unlocked) {
    unlocked = true;
    try { localStorage.setItem('pjhbd_unlock', '1'); } catch(e) {}
    document.getElementById('unlockMsg').classList.remove('hidden');
    refreshMenu();
  }
  jingleMilestone();
  hide('hud');
  setTimeout(()=>show('inter'), 300);
  document.getElementById('hud').classList.add('hidden');
}
function update() {
  t++;
  const cap = mode==='endless' ? 4.6 : 3.7;
  speed = Math.min(cap, 1.6 + t*0.0014 + (mode==='story'&&level===2 ? .2 : 0));
  if (mode === 'endless') { distance += speed * 0.06; if (t % 30 === 0) updateHUD(); }
  if (inv > 0) inv--;

  players.forEach(p => {
    p.vy += 0.25;
    p.y += p.vy;
    if (p.y >= GROUND) { p.y = GROUND; p.vy = 0; p.jumps = 0; }
    if (t % Math.max(3, 7 - speed|0) === 0) p.frame ^= 1;
  });

  if (--spawnTimer <= 0) { spawn(); spawnTimer = Math.max(24, 56 - speed*9) + Math.random()*26; }

  // 收集：任一角色碰到就算
  items = items.filter(it => {
    it.x -= speed;
    const s = it.type==='candle' ? {w:12,h:20} : it.type==='eleph' ? {w:24,h:16} : {w:18,h:18};
    for (const p of players) {
      const w = p.kind==='duo' ? 48 : 22;
      if (p.x+4 < it.x+s.w && p.x+w > it.x && p.y-32 < it.y && p.y > it.y-s.h) { collect(it); return false; }
    }
    return it.x > -30;
  });
  // 受傷：窄判定
  rocks = rocks.filter(rk => {
    rk.x -= speed;
    if (inv === 0) {
      for (const p of players) {
        const [hx1, hx2] = p.kind==='duo' ? [p.x+13, p.x+39] : [p.x+6, p.x+18];
        if (hx1 < rk.x+rk.w-5 && hx2 > rk.x+5 && p.y > GROUND-rk.h+3) {
          hearts--; inv = 70; shake = 10;
          pops.push({x:rk.x,y:GROUND-26,txt:'-❤️',c:'#D9556B',l:50});
          beep(140,.16,'sawtooth',.14); beep(110,.16,'sawtooth',.12,.08);
          updateHUD();
          if (hearts <= 0) gameOver();
          return false;
        }
      }
    }
    return rk.x > -30;
  });
  pops = pops.filter(p => { p.y -= .5; return --p.l > 0; });

  clouds.forEach(c => { c.x -= speed*.18; if (c.x < -60) { c.x = CW+40; c.y = 10+Math.random()*30; } });
  palms.forEach(p => { p.x -= speed*.55; if (p.x < -30) p.x = CW+40+Math.random()*80; });
  bgEle.forEach(el => { el.x -= speed*.35; if (el.x < -50) el.x = CW+120+Math.random()*260; });
  bgPump.forEach(pk => { pk.x -= speed*.3; if (pk.x < -60) pk.x = CW+150+Math.random()*300; });
  if (shake > 0) shake--;
}
function gameOver() {
  state = 'over';
  hide('hud'); document.getElementById('hud').classList.add('hidden');
  let msg;
  if (mode === 'endless') {
    const d = Math.floor(distance);
    let rec = '';
    if (d > best) { best = d; rec = '<br>🏆 新紀錄！'; try { localStorage.setItem('pjhbd_best', String(best)); } catch(e){} }
    document.getElementById('overTitle').textContent = '🏁 跑到這裡了！';
    msg = `這一趟跑了 <b>${d} m</b>（最佳 ${best} m）${rec}<br>🕯️${got.candle} 🐘${got.eleph} 🍰${got.cake} 🫛${score}`;
  } else {
    document.getElementById('overTitle').textContent = '💥 哎呀，絆倒了！';
    msg = `這一趟收集了：<br>🕯️ ${got.candle}/34　🐘 ${got.eleph}/37　🍰 ${got.cake}/12　🫛 ${score}<br>` +
          (mode==='duo' ? '兩個人要一起躲石頭，再試一次！' : '牽好手，再來一次！');
  }
  document.getElementById('overStats').innerHTML = msg;
  setTimeout(()=>show('over'), 400);
}
function win() {
  state = 'win';
  jingleWin();
  document.getElementById('finalScore').textContent = score;
  hide('hud'); document.getElementById('hud').classList.add('hidden');
  setTimeout(()=> {
    show('win');

      c.style.animationDelay = Math.random()*1.2 + 's';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 3600);
    }

}

/* ================= 繪製 ================= */
function drawBG() {
  ctx.fillStyle = theme.skyTop; ctx.fillRect(0,0,CW,104);
  ctx.fillStyle = theme.skyMid; ctx.fillRect(0,64,CW,40);
  if (theme.night) {
    ctx.fillStyle = '#FFF3C0';
    STARS.forEach(s => { if ((t>>4)%3 !== s.tw) ctx.fillRect(s.x, s.y, 2, 2); });
    ctx.fillStyle = '#FFF6D8'; ctx.fillRect(266, 18, 14, 14); ctx.fillStyle = theme.skyTop; ctx.fillRect(262, 14, 10, 10);
  }
  ctx.fillStyle = theme.cloud;
  clouds.forEach(c => { ctx.fillRect(c.x,c.y,c.w,8); ctx.fillRect(c.x+5,c.y-5,c.w-10,6); });
  ctx.fillStyle = theme.sea; ctx.fillRect(0,104,CW,26);
  ctx.fillStyle = theme.wave;
  for (let i=0;i<8;i++) ctx.fillRect(((i*47 + t*.4) % (CW+30))-15, 108+(i%3)*7, 18, 2);
  ctx.fillStyle = theme.island; ctx.fillRect(24,98,26,6); ctx.fillRect(250,96,34,8);
  if (theme.night) {
    // 直島：背景大南瓜（草間彌生風點點）
    bgPump.forEach(pk => {
      ctx.fillStyle = '#E8B830';
      ctx.fillRect(pk.x, 108, 34, 20);
      ctx.fillRect(pk.x-4, 112, 42, 12);
      ctx.fillStyle = '#2E2A24';
      ctx.fillRect(pk.x+14, 102, 6, 7);
      [[6,112],[16,116],[26,112],[10,122],[22,122],[2,116],[32,118]].forEach(([dx,dy])=>ctx.fillRect(pk.x+dx, dy, 3, 3));
    });
  } else {
    bgEle.forEach(el => {
      ctx.fillStyle = el.hue;
      ctx.fillRect(el.x,112,26,12); ctx.fillRect(el.x+22,106,10,10); ctx.fillRect(el.x+30,110,3,9);
      ctx.fillRect(el.x+2,124,4,5); ctx.fillRect(el.x+18,124,4,5);
      ctx.fillStyle='#FFF'; ctx.fillRect(el.x+27,108,2,2);
    });
  }
  ctx.fillStyle = theme.sand; ctx.fillRect(0,130,CW,CH-130);
  ctx.fillStyle = theme.fleck;
  for (let i=0;i<14;i++) ctx.fillRect(((i*61 + t*speed*.9) % (CW+20))-10, 138+(i*13)%36, 8, 2);
  palms.forEach(p => {
    ctx.fillStyle=theme.trunk; ctx.fillRect(p.x,112,4,22);
    ctx.fillStyle=theme.leaf;
    ctx.fillRect(p.x-8,108,20,4); ctx.fillRect(p.x-5,104,14,4); ctx.fillRect(p.x-2,100,8,4);
  });
}
function drawPlayers(blink) {
  players.forEach(p => {
    if (blink) return;
    const airborne = p.y < GROUND;
    if (p.kind === 'duo') drawDuo(p.x, p.y-32, airborne ? 0 : p.frame);
    else if (p.kind === 'wife') drawSpr(airborne||!p.frame ? SPR.wife1 : SPR.wife2, p.x, p.y-32, 2);
    else drawSpr(airborne||!p.frame ? SPR.pj1 : SPR.pj2, p.x, p.y-32, 2);
  });
}
function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random()-.5)*3.5, (Math.random()-.5)*3.5);
  drawBG();
  items.forEach(it => {
    if (it.type==='bean')   drawSpr(SPR.bean, it.x, it.y-16, 2);
    if (it.type==='candle') drawSpr(SPR.candle, it.x, it.y-20, 2);
    if (it.type==='cake')   drawSpr(SPR.cake, it.x, it.y-18, 2);
    if (it.type==='eleph')  drawSpr(SPR.eleph, it.x, it.y-16, 2, {E:it.hue});
  });
  rocks.forEach(rk => drawSpr(SPR.rock, rk.x, GROUND-12, 2));
  drawPlayers(inv > 0 && (t>>2) % 2 === 0);
  ctx.font='bold 9px monospace'; ctx.textAlign='center';
  pops.forEach(p => { ctx.fillStyle=p.c; ctx.fillText(p.txt, p.x+8, p.y); });
  ctx.restore();
}
function drawMenuScene() {
  drawBG();
  drawDuo(136, GROUND-32, ((t/20)|0)%2);
}
function loop() {
  if (state === 'play') { update(); draw(); }
  else if (state === 'menu') { t += .5; drawMenuScene(); }
  requestAnimationFrame(loop);
}
theme = THEME_BEACH;
players = [makePlayer('duo', 36)];
items=[]; rocks=[]; pops=[]; score=0; hearts=3; got={candle:0,eleph:0,cake:0};
clouds = Array.from({length:4},(_,i)=>({x:i*90+20, y:12+Math.random()*26, w:26+Math.random()*20}));
palms = [{x:140},{x:300}];
bgEle = [{x:420,hue:'#5B8FD6'},{x:600,hue:'#6FBF74'}];
bgPump = [{x:480},{x:720}];
refreshMenu();
loop();
</script>
